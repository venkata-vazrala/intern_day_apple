<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Automation Tracker{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background: #0f172a; color: #e2e8f0; }
    header { padding: 16px 24px; background: #111827; border-bottom: 1px solid #1f2937; }
    header a { color: #93c5fd; text-decoration: none; font-weight: 600; }
    main { padding: 24px; max-width: 1120px; margin: 0 auto; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-gap: 16px; }
    .col-12 { grid-column: span 12; }
    .col-6 { grid-column: span 6; }
    .col-4 { grid-column: span 4; }
    .muted { color: #94a3b8; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 9999px; background: #1f2937; color: #93c5fd; font-size: 12px; }
    .progress { background: #1f2937; border-radius: 8px; overflow: hidden; height: 10px; }
    .bar { background: linear-gradient(90deg, #60a5fa, #22d3ee); height: 100%; }
    a.btn { background: #2563eb; color:#fff; padding: 8px 12px; text-decoration: none; border-radius: 8px; }
    a.btn:hover { background: #1d4ed8; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 6px; border-bottom: 1px solid #1f2937; text-align: left; }
  </style>
</head>
<body>
  <header>
    <a href="/">Automation Build & Test Tracker</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
